version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dividdy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dividdy_secret}
      POSTGRES_DB: ${DB_NAME:-dividdy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-dividdy} -d ${DB_NAME:-dividdy}']
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-dividdy}:${DB_PASSWORD:-dividdy_secret}@db:5432/${DB_NAME:-dividdy}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-change-me-in-production-magic}
      MAGIC_LINK_EXPIRES_IN: ${MAGIC_LINK_EXPIRES_IN:-15m}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Dividdy <noreply@dividdy.local>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
    volumes:
      - uploads:/app/uploads
    ports:
      - '${API_PORT:-4000}:4000'
    depends_on:
      db:
        condition: service_healthy

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:

