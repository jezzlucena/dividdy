services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: dividdy-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: dividdy
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27019:27017"
    networks:
      - dividdy-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/dividdy --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    container_name: dividdy-backend
    restart: unless-stopped
    ports:
      - "8092:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - dividdy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.dividdy.com
        NEXT_PUBLIC_ADSENSE_CLIENT_ID: ca-pub-8262483117144824
    env_file: ./frontend/.env
    container_name: dividdy-frontend
    restart: unless-stopped
    ports:
      - "8091:3000"
    depends_on:
      - backend
    networks:
      - dividdy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  dividdy-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
