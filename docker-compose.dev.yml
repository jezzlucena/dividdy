version: '3.8'

# Development docker-compose file
# Run with: docker compose -f docker-compose.dev.yml up

services:
  # PostgreSQL Database only for development
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dividdy
      POSTGRES_PASSWORD: dividdy_dev
      POSTGRES_DB: dividdy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dividdy -d dividdy']
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: MailHog for testing emails locally
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

volumes:
  postgres_data_dev:

